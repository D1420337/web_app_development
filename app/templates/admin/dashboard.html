{% extends 'base.html' %}

{% block content %}
<div class="row mb-5">
    <div class="col text-center">
        <h1 class="display-5 fw-bold mt-4">後台管理中心</h1>
        <p class="lead text-muted">歡迎回來，系統管理員 {{ session.get('username') }}！</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-5 mb-4">
        <div class="card bg-primary text-white h-100 shadow border-0 rounded-4 transition-hover">
            <div class="card-body d-flex flex-column align-items-center justify-content-center py-5">
                <i class="bi bi-people-fill display-1 mb-3"></i>
                <h3 class="card-title fw-bold">使用者管理</h3>
                <p class="text-center px-4 mt-2 opacity-75">查看、管理所有註冊於本系統的會員名單與權限。</p>
                <a href="{{ url_for('admin.users') }}" class="btn btn-light btn-lg mt-4 px-5 fw-bold rounded-pill text-primary">進入使用者名單</a>
            </div>
        </div>
    </div>
    
    <div class="col-md-5 mb-4">
        <div class="card bg-dark text-white h-100 shadow border-0 rounded-4 transition-hover">
            <div class="card-body d-flex flex-column align-items-center justify-content-center py-5">
                <i class="bi bi-house-door-fill display-1 mb-3"></i>
                <h3 class="card-title fw-bold">前台總覽</h3>
                <p class="text-center px-4 mt-2 opacity-75">回到一般使用者視角，確認食譜清單與前端展示狀態。</p>
                <a href="{{ url_for('recipe.index') }}" class="btn btn-outline-light btn-lg mt-4 px-5 fw-bold rounded-pill">返回食譜首頁</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
