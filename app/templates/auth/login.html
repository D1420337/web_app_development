{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 col-lg-5 mx-auto mt-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-dark text-white text-center py-4 rounded-top-3">
                <h4 class="mb-0 fw-bold">登入帳號</h4>
            </div>
            <div class="card-body p-5">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">帳號</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus placeholder="請輸入帳號">
                    </div>
                    <div class="mb-5">
                        <label for="password" class="form-label fw-bold">密碼</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="請輸入密碼">
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">登入</button>
                    </div>
                </form>
                <div class="text-center text-muted">
                    <span>還沒有帳號嗎？</span> <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">立即註冊</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
